        // wired in the Designer; click this to test the connection
        private void button1_Click(object sender, EventArgs e)
        {
            TestConnection();
            SqlConnection con = new SqlConnection(connStr);
            con.Open();
            SqlCommand cmd = new SqlCommand("log_new_transaction", con);
            cmd.CommandType = CommandType.StoredProcedure;
            cmd.Parameters.AddWithValue("@transaction_type", cmbType.Text);
            cmd.Parameters.AddWithValue("@transaction_status", cmbStatus1.Text);
            cmd.Parameters.AddWithValue("@payment_id", DBNull.Value);
            cmd.ExecuteNonQuery();
            con.Close();
            MessageBox.Show("Transaction logged successfully");
        }
        

        private void TestConnection()
        {
            try
            {
                using (var conn = new SqlConnection(connStr))
                {
                    conn.Open();
                    MessageBox.Show($"Connected to '{conn.Database}' on '{conn.DataSource}'", "OK", MessageBoxButtons.OK, MessageBoxIcon.Information);
                }
            }
            catch (SqlException ex)
            {
                MessageBox.Show($"SQL error {ex.Number}: {ex.Message}", "Connection failed", MessageBoxButtons.OK, MessageBoxIcon.Error);
            }
            catch (Exception ex)
            {
                MessageBox.Show(ex.Message, "Connection failed", MessageBoxButtons.OK, MessageBoxIcon.Error);
            }
        }

        private void loadbtn_Click(object sender, EventArgs e)
        {
            TestConnection();
            SqlConnection con = new SqlConnection(connStr);
            con.Open();
            SqlCommand cmd = new SqlCommand("Select * from transactions", con);
            SqlDataReader reader = cmd.ExecuteReader();
            DataTable dt = new DataTable();
            dt.Columns.Add("Transaction ID", typeof(int));
            dt.Columns.Add("Transaction Date", typeof(DateTime));
            dt.Columns.Add("Transaction Type", typeof(string));
            dt.Columns.Add("Transaction Status", typeof(string));
            dt.Columns.Add("Payment ID", typeof(int));
            while (reader.Read())
            {
                DataRow row = dt.NewRow();
                row["Transaction ID"] = reader["transaction_id"];
                row["Transaction Date"] = reader["transaction_datetime"];
                row["Transaction Type"] = reader["transaction_type"];
                row["Transaction Status"] = reader["transaction_status"];
                row["Payment ID"] = reader["payment_id"];
                dt.Rows.Add(row);
            }
            dataGridView1.DataSource = dt;
            reader.Close();
            con.Close();
        }

        private void filterbtn_Click(object sender, EventArgs e)
        {
            TestConnection();
            SqlConnection con = new SqlConnection(connStr);
            con.Open();
            SqlCommand cmd = new SqlCommand("get_transaction_status", con);
            cmd.CommandType = CommandType.StoredProcedure;
            cmd.Parameters.AddWithValue("@status", trnstatus.Text);
            SqlDataReader reader = cmd.ExecuteReader();
            DataTable dt = new DataTable();
            dt.Load(reader);
            dataGridView1.DataSource = dt;
            reader.Close();
            con.Close();

        }

